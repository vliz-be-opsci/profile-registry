name: Process Profile Registrations

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  process-registration:
    if: contains(github.event.issue.title, 'Register profile:') || contains(github.event.issue.body, 'Profile URI:')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build site assets with Bun
        run: bun run build

      - name: Process registration with wrx
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_CREATOR: ${{ github.event.issue.user.login }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          REPOSITORY: ${{ github.repository }}
        run: bun run process-registration-issue

      - name: Open PR with per-issue N-Quads
        id: create_pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.PAT_TOKEN }}
          add-paths: |
            profiles/by-issue/${{ github.event.issue.number }}.*
            profiles/by-name/*
          branch: registration/issue-${{ github.event.issue.number }}
          commit-message: "chore: process profile registration issue #${{ github.event.issue.number }}"
          title: "Process profile registration #${{ github.event.issue.number }}"
          body: |
            Automated profile registration output for issue #${{ github.event.issue.number }}.

            This PR contains only the generated per-issue profile files and by-name symlinks.
          delete-branch: true

      - name: Append PR Provenance to N-Quads
        if: steps.create_pr.outputs.pull-request-number
        env:
          PR_NUMBER: ${{ steps.create_pr.outputs.pull-request-number }}
          PR_URL: ${{ steps.create_pr.outputs.pull-request-url }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          REPOSITORY: ${{ github.repository }}
        run: |
          git fetch origin
          git checkout registration/issue-${{ github.event.issue.number }}
          bun run add-pr-provenance
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profiles/by-issue/${{ github.event.issue.number }}.*
          git commit -m "chore: append PR provenance to issue #${{ github.event.issue.number }} [skip ci]"
          git push origin registration/issue-${{ github.event.issue.number }}

      - name: Comment issue with processing status
        if: steps.create_pr.outputs.pull-request-number
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.issue.number;
            const prNumber = "${{ steps.create_pr.outputs.pull-request-number }}";
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `Profile registration issue #${issueNumber} completed. Opened PR #${prNumber} containing files under profiles/by-issue/${issueNumber}.* and profiles/by-name/.`
            });

      - name: Comment PR with profile extraction summary
        if: steps.create_pr.outputs.pull-request-number
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'registration-summary.json';
            if (!fs.existsSync(path)) return;
            const summary = JSON.parse(fs.readFileSync(path, 'utf8'));
            const prNumber = parseInt("${{ steps.create_pr.outputs.pull-request-number }}");
            
            let body = `### 📋 Profile Registration Summary\n\n`;
            if (summary.isResourceSubmission) {
              body += `This submission was recognized as a **Resource** URL:\n`;
              body += `- Submitted Resource URL: \`${summary.submittedUri}\`\n\n`;
              if (summary.registeredProfiles > 0) {
                body += `The following **${summary.registeredProfiles}** profile(s) were successfully discovered, crawled, and registered:\n`;
                for (const profile of summary.discoveredProfiles) {
                  body += `- \`${profile}\` (derived from the resource URL above)\n`;
                }
              } else {
                body += `⚠️ No profiles were discovered on this resource URL.\n`;
              }
            } else {
              body += `This submission was registered as a **Profile** URL:\n`;
              body += `- Registered Profile URL: \`${summary.submittedUri}\`\n`;
            }
            body += `\n- **Total Triples Written**: ${summary.writtenTriples}\n`;
            body += `- **Output File**: [\`${summary.outputFile}\`](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/registration/issue-${context.issue.number}/${summary.outputFile})\n`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: body
            });
