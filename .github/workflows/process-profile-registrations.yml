name: Process Profile Registrations

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  process-registration:
    if: contains(github.event.issue.title, 'Register profile:') || contains(github.event.issue.body, 'Profile URI:')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build site assets with Bun
        run: bun run build

      - name: Process registration with wrx
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: bun run process-registration-issue

      - name: Open PR with per-issue N-Quads
        id: create_pr
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: profiles/issue-${{ github.event.issue.number }}.nq
          branch: registration/issue-${{ github.event.issue.number }}
          commit-message: chore: process profile registration issue #${{ github.event.issue.number }}
          title: "Process profile registration #${{ github.event.issue.number }}"
          body: |
            Automated profile registration output for issue #${{ github.event.issue.number }}.

            This PR contains only the generated N-Quads file for the requested URI.
          delete-branch: true

      - name: Comment issue with processing status
        if: steps.create_pr.outputs.pull-request-number
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Profile registration workflow completed. Opened PR #${{ steps.create_pr.outputs.pull-request-number }} containing \`profiles/issue-${{ github.event.issue.number }}.nq\`.`
            });
