name: Process Profile Registrations

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: write
  issues: write

jobs:
  process-registration:
    if: contains(github.event.issue.title, 'Register profile:') || contains(github.event.issue.body, 'Profile URI:')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build site assets with Bun
        run: bun run build

      - name: Process registration with wrx
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: bun run process-registration-issue

      - name: Commit registry updates
        id: commit_changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add registry.csv profile-registry-triples.nq
          git commit -m "chore: process profile registration issue #${{ github.event.issue.number }}"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Comment issue with processing status
        if: steps.commit_changes.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "Profile registration workflow completed. `registry.csv` and `profile-registry-triples.nq` were updated when wrx discovered profile data."
            });
