<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Registry</title>
  </head>
  <body>
    <main>
      <h1>Profile Registry</h1>
      <form id="register-profile-form">
        <label for="profile-uri">Profile URI</label>
        <input id="profile-uri" name="profile-uri" type="text" required />
        <button type="submit">Register Profile</button>
      </form>
      <section>
        <h2>Profile Registry Triples</h2>
        <p id="triples-status">Loading triples…</p>
        <pre id="triples-output"></pre>
      </section>
    </main>
    <script>
      const triplesStatus = document.getElementById("triples-status");
      const triplesOutput = document.getElementById("triples-output");

      async function loadTriples() {
        try {
          const response = await fetch("./profile-registry-triples.nq", {
            cache: "no-store",
          });
          if (!response.ok) {
            throw new Error("No triples found yet.");
          }
          const content = await response.text();
          const lines = content
            .split("\n")
            .map((line) => line.trim())
            .filter(Boolean);
          triplesStatus.textContent = `${lines.length} triples loaded`;
          triplesOutput.textContent = lines.join("\n");
        } catch (_) {
          triplesStatus.textContent =
            "No triples available yet. New registrations will populate this view.";
          triplesOutput.textContent = "";
        }
      }

      loadTriples();

      document
        .getElementById("register-profile-form")
        .addEventListener("submit", function (event) {
          event.preventDefault();

          const profileUriInput = document
            .getElementById("profile-uri")
            .value.trim();

          if (!profileUriInput) {
            return;
          }

          let profileUri;
          if (/^urn:[a-z0-9][a-z0-9-]{0,31}:.+/i.test(profileUriInput)) {
            profileUri = profileUriInput;
          } else {
            try {
              const parsedUri = new URL(profileUriInput);
              if (!parsedUri.hostname) {
                alert("Please provide a valid HTTP or HTTPS URI.");
                return;
              }
              if (
                parsedUri.protocol !== "http:" &&
                parsedUri.protocol !== "https:"
              ) {
                alert("Please provide an HTTP or HTTPS URI.");
                return;
              }
              profileUri = parsedUri.href;
            } catch (_) {
              alert("Please provide a valid URI.");
              return;
            }
          }

          const issueTitle = `Register profile: ${profileUri}`;
          const issueBody = `## Profile registration request\n\n- Profile URI: ${profileUri}\n- rdfs:type: \n\nPlease provide a valid rdfs:type for this profile.`;
          const issueUrl = `https://github.com/vliz-be-opsci/profile-registry/issues/new?title=${encodeURIComponent(issueTitle)}&body=${encodeURIComponent(issueBody)}`;

          window.location.assign(issueUrl);
        });
    </script>
  </body>
</html>
